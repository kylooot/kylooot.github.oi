<body>

<div class="parDiv">
<h1 style="font: Arial;"> Heal the Scout ?</h1>

<script>
function light(sw) {
  var pic;
  if (sw == 0) {
    pic = "not healing.png"
  } else {
    pic = "healing.png"
  }
  document.getElementById('myImage').src = pic;
}
</script>

<div class="myDiv"> 

<img id="myImage" src="not healing.png" width="auto" height="auto" >
</div>

<div class="wrapper">
<p>
<button type="button" onclick="light(1)">Healing</button>
<button type="button" onclick="light(0)">No heals for you!</button>
</p>

</div>
</body>
